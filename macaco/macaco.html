<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Macaco</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='./css/main.css'>
</head>
<body>
    <style>
        body{
            background-image: url(./images/jungle.jpg);
            background-size: cover;
        }
    </style>
    <h1> Macaco </h1>
    <img class="bamboo" src="./images/bamboo-border-clipart.png">
    <div class="conteiner">
        <div class="slider">
            <div class="slides">
                <img class="slide" src="./images/monke.png" alt="monke">
                <img class="slide" src="./images/funny-monkey-pictures-4f6u8ng4e2ewicrh.jpg" alt="funny">
                <img class="slide" src="./images/thinking.jpg" alt="classy">
            </div>
            <button class="prev" onclick="prevSlide()">&#10094</button>
            <button class="next" onclick="nextSlide()">&#10095</button>
        </div>
        <script src='./js/main.js'></script>
        <div class="container_for_information">
            <div class="informações">
                <div class="fix">
                <h2>fatos macacais !</h2>
                </div>
                <div class="lista">
                    <ul>
                        <li>macacos e humanos compartilham 90% do seu DNA</li>
                        <li>macacos gostam de banana</li>
                        <li>macacos tem uma memória melhor do que os humanos</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
